version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # Mount Hugging Face cache to reuse local models offline inside the container
      - ~/.cache/huggingface:/root/.cache/huggingface
    environment:
      - ENV=production
      - HOST=0.0.0.0
      - PORT=8000
      - ALLOWED_ORIGINS=http://localhost,http://localhost:80
      - REAL_DSP_MODE=true
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
